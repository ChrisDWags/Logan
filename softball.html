<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Pictures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="gallery.html" class="button back-btn">← Back to Galleries</a>

  <section class="gallery-wrapper">
    <h1>Sports Pictures</h1>
    <div id="softball-gallery" class="gallery-grid"></div>
  </section>

  <script>
    fetch('https://res.cloudinary.com/dnskk9pag/image/resources?prefix=softball_gallery&max_results=200')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("softball-gallery");
        container.innerHTML = '';

        if (data.resources && data.resources.length > 0) {
          data.resources.forEach(img => {
            const image = document.createElement("img");
            image.src = img.secure_url;
            image.className = "gallery-photo";
            container.appendChild(image);
          });
        } else {
          container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 50px;">No images found.<br>Try uploading again or check folder name.</p>';
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("softball-gallery").innerHTML = '<p style="color: red; grid-column: 1 / -1; text-align: center;">Could not load images.<br>Open F12 → Console and tell me what you see.</p>';
      });
  </script>
</body>
</html>
