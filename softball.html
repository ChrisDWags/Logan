<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Pictures</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <a href="gallery.html" class="button back-btn">← Back to Galleries</a>

  <section class="gallery-wrapper">
    <h1>Sports Pictures</h1>

    <div id="softball-gallery" class="gallery-grid"></div>
  </section>

  <script>
  fetch("https://res.cloudinary.com/dnskk9pag/image/search", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      expression: "folder:home/softball_gallery"
    })
  })
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("softball-gallery");

    data.resources.forEach(img => {
      const image = document.createElement("img");
      image.src = img.secure_url;
      image.className = "gallery-photo";
      container.appendChild(image);
    });
  })
  .catch(err => console.error("Error loading images:", err));
</script>


</body>
</html>
