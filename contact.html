<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hire Me</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <a href="index.html" class="button back-btn">← Back to Home</a>

  <section class="contact-wrapper">
    <div class="contact-card">
      <h1>Hire Me</h1>
      <p class="contact-subtitle">Fill out the form below and I’ll get back to you soon.</p>

      <form action="https://formspree.io/f/mnjrdzea" method="POST" class="contact-form">

        <!-- Recommended hidden fields -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Photography Inquiry">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_redirect" value="thankyou.html">

        <!-- Optional: redirect to a thank-you page -->
        <!-- I can make this page for you -->
        <input type="hidden" name="_redirect" value="https://yourwebsite.com/thankyou.html">

        <div class="form-group">
         <label>Your Name</label>
         <input type="text" name="name" required>
       </div>
     
       <div class="form-group">
         <label>Email</label>
         <input type="email" name="email" required>
       </div>
     
       <div class="form-group">
         <label>Phone</label>
         <input type="text" name="phone" required>
       </div>
     
       <div class="form-group">
         <label>Type of Pictures</label>
         <textarea name="message" rows="4" required></textarea>
       </div>
     
       <div class="form-group">
         <label>Date</label>
         <input type="text" name="date" required>
       </div>
     
       <button type="submit" class="submit-btn">Send Message</button>
      </form>

    </div>
  </section>

</body>
</html>
