<body>
  <a href="index.html" class="button back-btn">← Back to Home</a>

  <section class="contact-container">
    <h1>Hire Me</h1>
    <p>Fill out the form below and I’ll get back to you soon.</p>

    <form action="https://formspree.io/f/yourFormID" method="POST" class="contact-form">
      <label>Your Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Phone</label>
      <input type="phone" name="phone" required>

      <label>Typer of Pictures</label>
      <textarea name="message" rows="6" required></textarea>

      <label>Data</label>
      <textarea name="date" rows="1" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>
</body>
