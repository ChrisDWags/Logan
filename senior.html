<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Senior Pictures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="gallery.html" class="button back-btn">← Back to Galleries</a>

  <section class="gallery-wrapper">
    <h1>Senior Pictures</h1>
    <div id="senior-gallery" class="gallery-grid"></div>
  </section>

  <script>
  const cloudName = "dnskk9pag";
  const prefix = "senior_gallery";   // ← change this if needed

  fetch(`https://res.cloudinary.com/${cloudName}/image/resources?prefix=${prefix}&max_results=200`)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("senior-gallery");
      container.innerHTML = '';

      if (data.resources && data.resources.length > 0) {
        console.log("Found", data.resources.length, "images");
        data.resources.forEach(img => {
          const image = document.createElement("img");
          image.src = img.secure_url;
          image.className = "gallery-photo";
          container.appendChild(image);
        });
      } else {
        container.innerHTML = `<p>No images found for prefix: ${prefix}</p>`;
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById("senior-gallery").innerHTML = '<p style="color:red;">Failed to load. Check console (F12).</p>';
    });
</script>
</body>
</html>
