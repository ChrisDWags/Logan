<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Senior Pictures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="gallery.html" class="button back-btn">← Back to Galleries</a>

  <section class="gallery-wrapper">
    <h1>Senior Pictures</h1>
    <div id="senior-gallery" class="gallery-grid"></div>
  </section>

  <script>
    // Try multiple ways
    const urls = [
      'https://res.cloudinary.com/dnskk9pag/image/resources?prefix=senior_gallery&max_results=200',
      'https://res.cloudinary.com/dnskk9pag/image/resources?prefix=home/senior_gallery&max_results=200',
      'https://res.cloudinary.com/dnskk9pag/image/resources?tags=senior&max_results=200'
    ];

    let loaded = false;

    urls.forEach((url, index) => {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          if (loaded || !data.resources || data.resources.length === 0) return;
          
          loaded = true;
          const container = document.getElementById("senior-gallery");
          container.innerHTML = '';

          data.resources.forEach(img => {
            const image = document.createElement("img");
            image.src = img.secure_url;
            image.className = "gallery-photo";
            container.appendChild(image);
          });
        })
        .catch(() => {});
    });
  </script>
</body>
</html>
