<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Senior Pictures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="gallery.html" class="button back-btn">← Back to Galleries</a>

  <section class="gallery-wrapper">
    <h1>Senior Pictures</h1>
    <div id="senior-gallery" class="gallery-grid"></div>
  </section>

  <script>
    fetch('https://res.cloudinary.com/dnskk9pag/image/list?prefix=home/home/senior_gallery&max_results=200')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("senior-gallery");
        container.innerHTML = '';

        if (data.resources && data.resources.length > 0) {
          data.resources.forEach(img => {
            const image = document.createElement("img");
            image.src = img.secure_url;
            image.alt = img.public_id || "Senior photo";
            image.className = "gallery-photo";
            container.appendChild(image);
          });
        } else {
          container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 40px;">No images found yet. Upload some to the <strong>home/home/senior_gallery</strong> folder in Cloudinary.</p>';
        }
      })
      .catch(err => {
        console.error("Error loading images:", err);
        document.getElementById("senior-gallery").innerHTML = 
          '<p style="grid-column: 1 / -1; text-align: center; color: #e74c3c;">Unable to load gallery right now.</p>';
      });
  </script>
</body>
</html>
