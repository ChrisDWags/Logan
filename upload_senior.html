<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Senior Pictures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="gallery.html" class="button back-btn">← Back to Galleries</a>

  <section class="gallery-wrapper">
    <h1>Upload Senior Pictures</h1>
    <p>Images will automatically be tagged "senior"</p>

    <div style="max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px;">
      <input type="file" id="fileInput" multiple accept="image/*" style="margin-bottom: 20px;">
      <button onclick="uploadImages()" class="submit-btn" style="width: 100%;">Upload to Senior Gallery</button>
    </div>
  </section>

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <script>
    function uploadImages() {
      const files = document.getElementById('fileInput').files;
      if (files.length === 0) {
        alert("Please select images first");
        return;
      }

      files.forEach(file => {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'YOUR_UPLOAD_PRESET'); // Replace if you have one
        formData.append('tags', 'senior');

        fetch('https://api.cloudinary.com/v1_1/dnskk9pag/image/upload', {
          method: 'POST',
          body: formData
        })
        .then(() => console.log('Uploaded'))
        .catch(err => console.error(err));
      });

      alert("Images uploaded! They should appear in Senior Pictures shortly.");
    }
  </script>
</body>
</html>
